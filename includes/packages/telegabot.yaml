telegram_control:

  automation:

    ####################################################################
    # СТАРТ / ГЛАВНОЕ МЕНЮ
    ####################################################################
    - id: telegram_menu_start
      alias: Telegram — стартовое меню
      initial_state: true
      trigger:
        - platform: event
          event_type: telegram_command
          event_data:
            command: "/start"
      action:
        - service: telegram_bot.send_message
          data:
            chat_id: "{{ trigger.event.data.chat_id }}"
            message: |
              {{'\U0001F527'}} Выбрать комнату для управления:
            inline_keyboard:
              - "🚶 Коридор:/koridor_control , 🚽 Ванна:/vanna_control"
              - "🏠 Зал:/zal_control , 🍴 Кухня:/kuhnya_control"
              - "🛏️ Спальня:/spalnia_control , 🌉 Балкон:/balkon_control"
              - "💡 Електричество:/electro , ⛅ Улица:/garden"
              - "🎥 Свет:/lights"
              - "🚫 Убрать меню:/menu_hide"

    ####################################################################
    # ЕДИНЫЙ CALLBACK-РОУТЕР
    ####################################################################
    - id: telegram_callback_router
      alias: Telegram — callback router
      initial_state: true
      trigger:
        - platform: event
          event_type: telegram_callback

      action:
        - choose:

            ################################################################
            # СКРЫТЬ МЕНЮ
            ################################################################
            - conditions: "{{ trigger.event.data.command == '/menu_hide' }}"
              sequence:
                - service: telegram_bot.delete_message
                  data:
                    chat_id: "{{ trigger.event.data.chat_id }}"
                    message_id: "{{ trigger.event.data.message.message_id }}"

            ################################################################
            # ВОЗВРАТ В ГЛАВНОЕ МЕНЮ
            ################################################################
            - conditions: "{{ trigger.event.data.command == '/menu_back' }}"
              sequence:
                - service: telegram_bot.delete_message
                  data:
                    chat_id: "{{ trigger.event.data.chat_id }}"
                    message_id: "{{ trigger.event.data.message.message_id }}"
                - service: telegram_bot.send_message
                  data:
                    chat_id: "{{ trigger.event.data.chat_id }}"
                    message: |
                      {{'\U0001F527'}} Выбрать комнату для управления:
                    inline_keyboard:
                      - "🚶 Коридор:/koridor_control , 🚽 Туалет:/vanna_control"
                      - "🏠 Зал:/zal_control , 🍴 Кухня:/kuhnya_control"
                      - "🛏️ Спальня:/spalnia_control , 🌉 Балкон:/balkon_control"
                      - "💡 Електричество:/electro , ⛅ Улица:/garden"
                      - "🎥 Свет:/lights"
                      - "🚫 Убрать меню:/menu_hide"

            ################################################################
            # КОРИДОР
            ################################################################

            - conditions: >
                {{ trigger.event.data.command in ['/koridor_control', '/toggle_koridor_light'] }}
              sequence:
                - choose:
                    - conditions: "{{ trigger.event.data.command == '/toggle_koridor_light' }}"
                      sequence:
                        - service: switch.toggle
                          target:
                            entity_id: switch.1_ty_12z_switch_1
                        - service: telegram_bot.answer_callback_query
                          data:
                            callback_query_id: "{{ trigger.event.data.id }}"
                            message: "💡 Коридор переключён"

                # Удаляем старое сообщение
                - service: telegram_bot.delete_message
                  data:
                    chat_id: "{{ trigger.event.data.chat_id }}"
                    message_id: "{{ trigger.event.data.message.message_id }}"

                # Отправляем актуальное меню коридора
                - service: telegram_bot.send_message
                  data:
                    chat_id: "{{ trigger.event.data.chat_id }}"
                    message: >
                      {% set last = states.binary_sensor.motion_sensor_2_occupancy.last_changed %}
                      {% set last_local = last.as_local() %}
                      {% set diff = (now() - last_local).total_seconds() | int %}
                      {% set minutes = (diff // 60) %}
                      🚶 Управление коридор:
                      👣 Последнее движение — 
                      {% if is_state('binary_sensor.motion_sensor_2_occupancy','on') %}
                        сейчас
                      {% else %}
                        {{ last_local.strftime('%d.%m %H:%M:%S') }} ({{ minutes }} мин. назад)
                      {% endif %}

                      💡 Лампочка — {{ 'Вкл' if is_state('switch.1_ty_12z_switch_1','on') else 'Выкл' }}
                    inline_keyboard:
                      - "💡 Лампочка:/toggle_koridor_light , ↩️ Назад:/menu_back"

            ################################################################
            # ВАННА
            ################################################################
            - conditions: "{{ trigger.event.data.command == '/vanna_control' }}"
              sequence:
                - service: telegram_bot.delete_message
                  data:
                    chat_id: "{{ trigger.event.data.chat_id }}"
                    message_id: "{{ trigger.event.data.message.message_id }}"
                - service: telegram_bot.send_message
                  data:
                    chat_id: "{{ trigger.event.data.chat_id }}"
                    message: |
                      🚽 Ванна:
                      🌡️ {{ states('sensor.temp6_temperature') }} °C
                      💧 {{ states('sensor.temp6_humidity') }} %
                    inline_keyboard:
                      - "💡 Люстра:/toggle_vanna_light"
                      - "↩️ Назад:/menu_back"

            - conditions: "{{ trigger.event.data.command == '/toggle_vanna_light' }}"
              sequence:
                - service: switch.toggle
                  target:
                    entity_id: switch.2_ty_12z_switch_2
                - service: telegram_bot.answer_callback_query
                  data:
                    callback_query_id: "{{ trigger.event.data.id }}"
                    message: "💡 Ванна переключена"

            ################################################################
            # ЗАЛ
            ################################################################
            - conditions: "{{ trigger.event.data.command == '/zal_control' }}"
              sequence:
                - service: telegram_bot.delete_message
                  data:
                    chat_id: "{{ trigger.event.data.chat_id }}"
                    message_id: "{{ trigger.event.data.message.message_id }}"
                - service: telegram_bot.send_message
                  data:
                    chat_id: "{{ trigger.event.data.chat_id }}"
                    message: |
                      🏠 Зал:
                      🌡️ {{ states('sensor.temp4_temperature') }} °C
                      💧 {{ states('sensor.temp4_humidity') }} %
                    inline_keyboard:
                      - "💡 Люстра 1:/toggle_zal1 , 💡 Люстра 2:/toggle_zal2"
                      - "↩️ Назад:/menu_back"

            - conditions: "{{ trigger.event.data.command == '/toggle_zal1' }}"
              sequence:
                - service: switch.toggle
                  target:
                    entity_id: switch.1_ty_12z_switch_4
                - service: telegram_bot.answer_callback_query
                  data:
                    callback_query_id: "{{ trigger.event.data.id }}"
                    message: "💡 Зал (1 лампы)"

            - conditions: "{{ trigger.event.data.command == '/toggle_zal2' }}"
              sequence:
                - service: switch.toggle
                  target:
                    entity_id: switch.1_ty_12z_switch_5
                - service: telegram_bot.answer_callback_query
                  data:
                    callback_query_id: "{{ trigger.event.data.id }}"
                    message: "💡 Зал (2 лампы)"

            ################################################################
            # КУХНЯ
            ################################################################
            - conditions: >
                {{ trigger.event.data.command in ['/kuhnya_control', '/toggle_kuhnya_lustre', '/toggle_kuhnya_perimeter'] }}
              sequence:
                # Переключение света
                - choose:
                    - conditions: "{{ trigger.event.data.command == '/toggle_kuhnya_lustre' }}"
                      sequence:
                        - service: switch.toggle
                          target:
                            entity_id: switch.2_ty_12z_switch_5
                        - service: telegram_bot.answer_callback_query
                          data:
                            callback_query_id: "{{ trigger.event.data.id }}"
                            message: "💡 Люстра кухни переключена"

                    - conditions: "{{ trigger.event.data.command == '/toggle_kuhnya_perimeter' }}"
                      sequence:
                        - service: switch.toggle
                          target:
                            entity_id: switch.2_ty_12z_switch_6
                        - service: telegram_bot.answer_callback_query
                          data:
                            callback_query_id: "{{ trigger.event.data.id }}"
                            message: "💡 Периметр кухни переключён"

                # Удаляем старое сообщение
                - service: telegram_bot.delete_message
                  data:
                    chat_id: "{{ trigger.event.data.chat_id }}"
                    message_id: "{{ trigger.event.data.message.message_id }}"

                # Отправляем меню кухни
                - service: telegram_bot.send_message
                  data:
                    chat_id: "{{ trigger.event.data.chat_id }}"
                    message: |
                      🍴 Кухня:

                      💡 Люстра — {{ 'Вкл' if is_state('switch.2_ty_12z_switch_5','on') else 'Выкл' }}
                      💡 Периметр — {{ 'Вкл' if is_state('switch.2_ty_12z_switch_6','on') else 'Выкл' }}
                    inline_keyboard:
                      - "💡 Люстра:/toggle_kuhnya_lustre , 💡 Периметр:/toggle_kuhnya_perimeter"
                      - "↩️ Назад:/menu_back"

            ################################################################
            # СПАЛЬНЯ
            ################################################################
            - conditions: >
                {{ trigger.event.data.command in ['/spalnia_control', '/toggle_spalnia_lustre', '/toggle_spalnia_perimeter'] }}
              sequence:
                - choose:
                    - conditions: "{{ trigger.event.data.command == '/toggle_spalnia_lustre' }}"
                      sequence:
                        - service: switch.toggle
                          target:
                            entity_id: switch.1_ty_12z_switch_6
                        - service: telegram_bot.answer_callback_query
                          data:
                            callback_query_id: "{{ trigger.event.data.id }}"
                            message: "💡 Люстра спальни переключена"

                    - conditions: "{{ trigger.event.data.command == '/toggle_spalnia_perimeter' }}"
                      sequence:
                        - service: switch.toggle
                          target:
                            entity_id: button.controlperimeterlight_spalnap_toggle
                        - service: telegram_bot.answer_callback_query
                          data:
                            callback_query_id: "{{ trigger.event.data.id }}"
                            message: "💡 Периметр спальни переключён"

                # Удаляем старое сообщение
                - service: telegram_bot.delete_message
                  data:
                    chat_id: "{{ trigger.event.data.chat_id }}"
                    message_id: "{{ trigger.event.data.message.message_id }}"

                # Отправляем актуальное меню спальни
                - service: telegram_bot.send_message
                  data:
                    chat_id: "{{ trigger.event.data.chat_id }}"
                    message: |
                      🛏️ Спальня:
                      🌡️ {{ states('sensor.temp2_temperature') }} °C
                      💧 {{ states('sensor.temp2_humidity') }} %

                      💡 Люстра — {{ 'Вкл' if is_state('switch.1_ty_12z_switch_6','on') else 'Выкл' }}
                      💡 Периметр — {{ 'Вкл' if is_state('button.controlperimeterlight_spalnap_toggle','on') else 'Выкл' }}
                    inline_keyboard:
                      - "💡 Люстра:/toggle_spalnia_lustre , 💡 Периметр:/toggle_spalnia_perimeter"
                      - "↩️ Назад:/menu_back"

            ################################################################
            # БАЛКОН 
            ################################################################

            - conditions: >
                {{ trigger.event.data.command in ['/balkon_control',
                                                  '/toggle_balkon_zal',
                                                  '/toggle_balkon_kitchen'] }}
              sequence:
                - choose:
                    - conditions: "{{ trigger.event.data.command == '/toggle_balkon_zal' }}"
                      sequence:
                        - service: switch.toggle
                          target:
                            entity_id: switch.2_ty_12z_switch_8
                        - service: telegram_bot.answer_callback_query
                          data:
                            callback_query_id: "{{ trigger.event.data.id }}"
                            message: "💡 Зал переключён"

                    - conditions: "{{ trigger.event.data.command == '/toggle_balkon_kitchen' }}"
                      sequence:
                        - service: switch.toggle
                          target:
                            entity_id: switch.2_ty_12z_switch_7
                        - service: telegram_bot.answer_callback_query
                          data:
                            callback_query_id: "{{ trigger.event.data.id }}"
                            message: "💡 Кухня переключена"

                # Удаляем старое сообщение
                - service: telegram_bot.delete_message
                  data:
                    chat_id: "{{ trigger.event.data.chat_id }}"
                    message_id: "{{ trigger.event.data.message.message_id }}"

                # Отправляем обновлённое меню балкона
                - service: telegram_bot.send_message
                  data:
                    chat_id: "{{ trigger.event.data.chat_id }}"
                    message: |
                      🌉 Балкон:
                      🌡️ {{ states('sensor.temp3_temperature') }} °C
                      💧 {{ states('sensor.temp3_humidity') }} %

                      💡 Балкон в зале — {{ 'Вкл' if is_state('switch.2_ty_12z_switch_8','on') else 'Выкл' }}
                      💡 Балкон в кухне — {{ 'Вкл' if is_state('switch.2_ty_12z_switch_7','on') else 'Выкл' }}
                    inline_keyboard:
                      - "💡 Балкон в зале:/toggle_balkon_zal , 💡 Балкон в кухне:/toggle_balkon_kitchen"
                      - "↩️ Назад:/menu_back"

            ################################################################
            # ЭЛЕКТРИЧЕСТВО
            ################################################################
            - conditions: "{{ trigger.event.data.command == '/electro' }}"
              sequence:
                - service: telegram_bot.delete_message
                  data:
                    chat_id: "{{ trigger.event.data.chat_id }}"
                    message_id: "{{ trigger.event.data.message.message_id }}"

                - service: telegram_bot.send_message
                  data:
                    chat_id: "{{ trigger.event.data.chat_id }}"
                    message: >
                      {% set s = states %}

                      💡 *Электричество:*

                      ─────────────
                      🔌 *Основное*
                      • Квартира — {{ s('sensor.all_in_pro_power_2') }} W
                      • Всего — {{ s('sensor.total_power') }} W

                      ─────────────
                      💡 *Освещение*
                      • Свет — {{ s('sensor.svet_pitanie_power_2') }} W
                      • Свет платы — {{ s('sensor.svet_platy_power_2') }} W

                      ─────────────
                      🏠 *Бытовая техника*
                      • Холодильник — {{ s('sensor.kholodilnik_power_2') }} W
                      • Стиралка — {{ s('sensor.stiralka_power_2') }} W

                      ─────────────
                      🔥 *Котёл / заряд*
                      • Зарядник — {{ s('sensor.kotel_zariad_power') }} W
                      • Котёл — {{ s('sensor.sensor_kotel_power_delta') }} W

                    parse_mode: markdown
                    inline_keyboard:
                      - "🔄 Обновить:/electro , ↩️ Назад:/menu_back"

            ################################################################
            # УЛИЦА
            ################################################################
            - conditions: >
                {{ trigger.event.data.command in ['/garden',
                                                  '/toggle_garden_table',
                                                  '/toggle_garden_perimeter',
                                                  '/toggle_garden_left'] }}
              sequence:
                # Переключение ламп
                - choose:
                    - conditions: "{{ trigger.event.data.command == '/toggle_garden_table' }}"
                      sequence:
                        - service: switch.toggle
                          target:
                            entity_id: switch.2_ty_12z_switch_9
                        - service: telegram_bot.answer_callback_query
                          data:
                            callback_query_id: "{{ trigger.event.data.id }}"
                            message: "💡 Стол переключён"

                    - conditions: "{{ trigger.event.data.command == '/toggle_garden_perimeter' }}"
                      sequence:
                        - service: switch.toggle
                          target:
                            entity_id: switch.2_ty_12z_switch_10
                        - service: telegram_bot.answer_callback_query
                          data:
                            callback_query_id: "{{ trigger.event.data.id }}"
                            message: "💡 Периметр переключён"

                    - conditions: "{{ trigger.event.data.command == '/toggle_garden_left' }}"
                      sequence:
                        - service: switch.toggle
                          target:
                            entity_id: switch.2_ty_12z_switch_11
                        - service: telegram_bot.answer_callback_query
                          data:
                            callback_query_id: "{{ trigger.event.data.id }}"
                            message: "💡 Левый свет переключён"

                # Удаляем старое сообщение
                - service: telegram_bot.delete_message
                  data:
                    chat_id: "{{ trigger.event.data.chat_id }}"
                    message_id: "{{ trigger.event.data.message.message_id }}"

                # Отправляем обновлённое меню
                - service: telegram_bot.send_message
                  data:
                    chat_id: "{{ trigger.event.data.chat_id }}"
                    message: |
                      ⛅ Улица:
                      🌡️ {{ states('sensor.temp1_temperature') }} °C
                      💧 {{ states('sensor.temp1_humidity') }} %

                      💡 Стол — {{ 'Вкл' if is_state('switch.2_ty_12z_switch_9','on') else 'Выкл' }}
                      💡 Периметр — {{ 'Вкл' if is_state('switch.2_ty_12z_switch_10','on') else 'Выкл' }}
                      💡 Слева — {{ 'Вкл' if is_state('switch.2_ty_12z_switch_11','on') else 'Выкл' }}
                    inline_keyboard:
                      - "💡 Стол:/toggle_garden_table , 💡 Периметр:/toggle_garden_perimeter"
                      - "💡 Слева:/toggle_garden_left , ↩️ Назад:/menu_back"

            ################################################################
            # СВЕТ — СПИСОК ВКЛЮЧЁННЫХ ЛАМПОЧЕК
            ################################################################
            - conditions:
                - condition: template
                  value_template: "{{ trigger.event.data.command == '/lights' }}"
              sequence:
                - service: telegram_bot.delete_message
                  data:
                    message_id: "{{ trigger.event.data.message.message_id }}"
                    chat_id: "{{ trigger.event.data.chat_id }}"

                - service: telegram_bot.send_message
                  data:
                    chat_id: "{{ trigger.event.data.chat_id }}"
                    message: >
                      {% set lights = [
                        {'entity': 'switch.1_ty_12z_switch_1', 'name': 'Коридор'},
                        {'entity': 'switch.1_ty_12z_switch_6', 'name': 'Спальня центр'},
                        {'entity': 'switch.1_ty_12z_switch_4', 'name': 'Зал центр'},
                        {'entity': 'switch.2_ty_12z_switch_1', 'name': 'Складовка'},
                        {'entity': 'switch.1_ty_12z_switch_5', 'name': 'Зал 2'},
                        {'entity': 'switch.2_ty_12z_switch_8', 'name': 'Зал балкон'},
                        {'entity': 'switch.1_ty_12z_switch_2', 'name': 'Вытяжка гардероб'},
                        {'entity': 'switch.1_ty_12z_switch_3', 'name': 'Вытяжка ванна'},
                        {'entity': 'switch.2_ty_12z_switch_7', 'name': 'Кухня балкон'},
                        {'entity': 'switch.2_ty_12z_switch_5', 'name': 'Кухня'},
                        {'entity': 'switch.2_ty_12z_switch_2', 'name': 'Ванна 1'},
                        {'entity': 'switch.2_ty_12z_switch_3', 'name': 'Ванна 2'},
                        {'entity': 'switch.2_ty_12z_switch_6', 'name': 'Фартук'},
                        {'entity': 'switch.2_ty_12z_switch_4', 'name': 'Душ'},
                        {'entity': 'switch.1_ty_12z_switch_7', 'name': 'Спальня бра лево'},
                        {'entity': 'switch.1_ty_12z_switch_8', 'name': 'Спальня бра право'}
                      ] %}

                      {% set on_lights = lights | selectattr('entity','is_state','on') | list %}

                      {% if on_lights | length > 0 %}
                      💡 *Включённые лампочки:*
                      {% for light in on_lights %}
                      • {{ light.name }}
                      {% endfor %}
                      {% else %}
                      🚫 *Нет включённых лампочек.*
                      {% endif %}
                    inline_keyboard:
                      - "↩️ Вернуться:/menu_back , 🔄 Обновить:/lights"
