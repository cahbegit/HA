telegram_control:

  automation:

    ####################################################################
    # СТАРТ / ГЛАВНОЕ МЕНЮ
    ####################################################################
    - id: telegram_menu_start
      alias: Telegram — стартовое меню
      initial_state: true
      trigger:
        - platform: event
          event_type: telegram_command
          event_data:
            command: "/start"
      action:
        - service: telegram_bot.send_message
          data:
            chat_id: "{{ trigger.event.data.chat_id }}"
            message: |
              {{'\U0001F527'}} Выбрать комнату для управления:
            inline_keyboard:
              - "🚶 Коридор:/koridor_control , 🚽 Туалет:/vanna_control"
              - "🏠 Зал:/zal_control , 🍴 Кухня:/kuhnya_control"
              - "🛏️ Спальня:/spalnia_control , 🌉 Балкон:/balkon_control"
              - "🎥 Свет:/lights"
              - "🚫 Убрать меню:/menu_hide"

    ####################################################################
    # ЕДИНЫЙ CALLBACK-РОУТЕР
    ####################################################################
    - id: telegram_callback_router
      alias: Telegram — callback router
      initial_state: true
      trigger:
        - platform: event
          event_type: telegram_callback

      action:
        - choose:

            ################################################################
            # СКРЫТЬ МЕНЮ
            ################################################################
            - conditions: "{{ trigger.event.data.command == '/menu_hide' }}"
              sequence:
                - service: telegram_bot.delete_message
                  data:
                    chat_id: "{{ trigger.event.data.chat_id }}"
                    message_id: "{{ trigger.event.data.message.message_id }}"

            ################################################################
            # ВОЗВРАТ В ГЛАВНОЕ МЕНЮ
            ################################################################
            - conditions: "{{ trigger.event.data.command == '/menu_back' }}"
              sequence:
                - service: telegram_bot.delete_message
                  data:
                    chat_id: "{{ trigger.event.data.chat_id }}"
                    message_id: "{{ trigger.event.data.message.message_id }}"
                - service: telegram_bot.send_message
                  data:
                    chat_id: "{{ trigger.event.data.chat_id }}"
                    message: |
                      {{'\U0001F527'}} Выбрать комнату для управления:
                    inline_keyboard:
                      - "🚶 Коридор:/koridor_control , 🚽 Туалет:/vanna_control"
                      - "🏠 Зал:/zal_control , 🍴 Кухня:/kuhnya_control"
                      - "🛏️ Спальня:/spalnia_control , 🌉 Балкон:/balkon_control"
                      - "🎥 Свет:/lights"
                      - "🚫 Убрать меню:/menu_hide"

            ################################################################
            # КОРИДОР
            ################################################################
            - conditions: "{{ trigger.event.data.command == '/koridor_control' }}"
              sequence:
                - service: telegram_bot.delete_message
                  data:
                    chat_id: "{{ trigger.event.data.chat_id }}"
                    message_id: "{{ trigger.event.data.message.message_id }}"
                - service: telegram_bot.send_message
                  data:
                    chat_id: "{{ trigger.event.data.chat_id }}"
                    message: |
                      🚶 Управление коридор:
                      🚪 Дверь — {% if is_state('binary_sensor.0x00158d000119378d_contact','on') %}Открыта{% else %}Закрыта{% endif %}
                      👣 Движение — {% if is_state('binary_sensor.0x00158d00010f8920_occupancy','on') %}Есть{% else %}Нет{% endif %}
                    inline_keyboard:
                      - "💡 Лампочка:/toggle_koridor_light"
                      - "↩️ Назад:/menu_back"

            - conditions: "{{ trigger.event.data.command == '/toggle_koridor_light' }}"
              sequence:
                - service: switch.toggle
                  target:
                    entity_id: switch.1_ty_12z_switch_1
                - service: telegram_bot.answer_callback_query
                  data:
                    callback_query_id: "{{ trigger.event.data.id }}"
                    message: "💡 Коридор переключён"
                - delay: "00:00:01"
                - service: telegram_bot.delete_message
                  data:
                    chat_id: "{{ trigger.event.data.chat_id }}"
                    message_id: "{{ trigger.event.data.message.message_id }}"
                - service: telegram_bot.send_message
                  data:
                    chat_id: "{{ trigger.event.data.chat_id }}"
                    message: "💡 Состояние обновлено"
                    inline_keyboard:
                      - "↩️ Назад:/menu_back"

            ################################################################
            # ВАННА
            ################################################################
            - conditions: "{{ trigger.event.data.command == '/vanna_control' }}"
              sequence:
                - service: telegram_bot.delete_message
                  data:
                    chat_id: "{{ trigger.event.data.chat_id }}"
                    message_id: "{{ trigger.event.data.message.message_id }}"
                - service: telegram_bot.send_message
                  data:
                    chat_id: "{{ trigger.event.data.chat_id }}"
                    message: |
                      🚽 Ванна:
                      🌡️ {{ states('sensor.temp6_temperature') }} °C
                      💧 {{ states('sensor.temp6_humidity') }} %
                    inline_keyboard:
                      - "💡 Люстра:/toggle_vanna_light"
                      - "↩️ Назад:/menu_back"

            - conditions: "{{ trigger.event.data.command == '/toggle_vanna_light' }}"
              sequence:
                - service: switch.toggle
                  target:
                    entity_id: switch.2_ty_12z_switch_2
                - service: telegram_bot.answer_callback_query
                  data:
                    callback_query_id: "{{ trigger.event.data.id }}"
                    message: "💡 Ванна переключена"

            ################################################################
            # ЗАЛ
            ################################################################
            - conditions: "{{ trigger.event.data.command == '/zal_control' }}"
              sequence:
                - service: telegram_bot.delete_message
                  data:
                    chat_id: "{{ trigger.event.data.chat_id }}"
                    message_id: "{{ trigger.event.data.message.message_id }}"
                - service: telegram_bot.send_message
                  data:
                    chat_id: "{{ trigger.event.data.chat_id }}"
                    message: |
                      🏠 Зал:
                      🌡️ {{ states('sensor.temp4_temperature') }} °C
                      💧 {{ states('sensor.temp4_humidity') }} %
                    inline_keyboard:
                      - "💡 Люстра 1:/toggle_zal1 , 💡 Люстра 2:/toggle_zal2"
                      - "↩️ Назад:/menu_back"

            - conditions: "{{ trigger.event.data.command == '/toggle_zal1' }}"
              sequence:
                - service: switch.toggle
                  target:
                    entity_id: switch.1_ty_12z_switch_4
                - service: telegram_bot.answer_callback_query
                  data:
                    callback_query_id: "{{ trigger.event.data.id }}"
                    message: "💡 Зал (1 лампы)"

            - conditions: "{{ trigger.event.data.command == '/toggle_zal2' }}"
              sequence:
                - service: switch.toggle
                  target:
                    entity_id: switch.1_ty_12z_switch_5
                - service: telegram_bot.answer_callback_query
                  data:
                    callback_query_id: "{{ trigger.event.data.id }}"
                    message: "💡 Зал (2 лампы)"

            ################################################################
            # КУХНЯ
            ################################################################
            - conditions: "{{ trigger.event.data.command == '/kuhnya_control' }}"
              sequence:
                - service: telegram_bot.delete_message
                  data:
                    chat_id: "{{ trigger.event.data.chat_id }}"
                    message_id: "{{ trigger.event.data.message.message_id }}"
                - service: telegram_bot.send_message
                  data:
                    chat_id: "{{ trigger.event.data.chat_id }}"
                    message: |
                      🍴 Кухня:
                      🌡️ {{ states('sensor.temp3_temperature') }} °C
                      💧 {{ states('sensor.temp3_humidity') }} %
                    inline_keyboard:
                      - "↩️ Назад:/menu_back"

            ################################################################
            # СПАЛЬНЯ
            ################################################################
            - conditions: "{{ trigger.event.data.command == '/spalnia_control' }}"
              sequence:
                - service: telegram_bot.delete_message
                  data:
                    chat_id: "{{ trigger.event.data.chat_id }}"
                    message_id: "{{ trigger.event.data.message.message_id }}"
                - service: telegram_bot.send_message
                  data:
                    chat_id: "{{ trigger.event.data.chat_id }}"
                    message: |
                      🛏️ Спальня:
                      🌡️ {{ states('sensor.temp2_temperature') }} °C
                      💧 {{ states('sensor.temp2_humidity') }} %
                    inline_keyboard:
                      - "↩️ Назад:/menu_back"

            ################################################################
            # БАЛКОН
            ################################################################
            - conditions: "{{ trigger.event.data.command == '/balkon_control' }}"
              sequence:
                - service: telegram_bot.delete_message
                  data:
                    chat_id: "{{ trigger.event.data.chat_id }}"
                    message_id: "{{ trigger.event.data.message.message_id }}"
                - service: telegram_bot.send_message
                  data:
                    chat_id: "{{ trigger.event.data.chat_id }}"
                    message: |
                      🌉 Балкон:
                      🌡️ {{ states('sensor.temp1_temperature') }} °C
                      💧 {{ states('sensor.temp1_humidity') }} %
                    inline_keyboard:
                      - "↩️ Назад:/menu_back"

            ################################################################
            # СВЕТ — СПИСОК ВКЛЮЧЁННЫХ ЛАМПОЧЕК
            ################################################################
            - conditions:
                - condition: template
                  value_template: "{{ trigger.event.data.command == '/lights' }}"
              sequence:
                - service: telegram_bot.delete_message
                  data:
                    message_id: "{{ trigger.event.data.message.message_id }}"
                    chat_id: "{{ trigger.event.data.chat_id }}"

                - service: telegram_bot.send_message
                  data:
                    chat_id: "{{ trigger.event.data.chat_id }}"
                    message: >
                      {% set lights = [
                        {'entity': 'switch.1_ty_12z_switch_1', 'name': 'Коридор'},
                        {'entity': 'switch.1_ty_12z_switch_6', 'name': 'Спальня центр'},
                        {'entity': 'switch.1_ty_12z_switch_4', 'name': 'Зал центр'},
                        {'entity': 'switch.2_ty_12z_switch_1', 'name': 'Складовка'},
                        {'entity': 'switch.1_ty_12z_switch_5', 'name': 'Зал 2'},
                        {'entity': 'switch.2_ty_12z_switch_8', 'name': 'Зал балкон'},
                        {'entity': 'switch.1_ty_12z_switch_2', 'name': 'Вытяжка гардероб'},
                        {'entity': 'switch.1_ty_12z_switch_3', 'name': 'Вытяжка ванна'},
                        {'entity': 'switch.2_ty_12z_switch_7', 'name': 'Кухня балкон'},
                        {'entity': 'switch.2_ty_12z_switch_5', 'name': 'Кухня'},
                        {'entity': 'switch.2_ty_12z_switch_2', 'name': 'Ванна 1'},
                        {'entity': 'switch.2_ty_12z_switch_3', 'name': 'Ванна 2'},
                        {'entity': 'switch.2_ty_12z_switch_6', 'name': 'Фартук'},
                        {'entity': 'switch.2_ty_12z_switch_4', 'name': 'Душ'},
                        {'entity': 'switch.1_ty_12z_switch_7', 'name': 'Спальня бра лево'},
                        {'entity': 'switch.1_ty_12z_switch_8', 'name': 'Спальня бра право'}
                      ] %}

                      {% set on_lights = lights | selectattr('entity','is_state','on') | list %}

                      {% if on_lights | length > 0 %}
                      💡 *Включённые лампочки:*
                      {% for light in on_lights %}
                      • {{ light.name }}
                      {% endfor %}
                      {% else %}
                      🚫 *Нет включённых лампочек.*
                      {% endif %}
                    inline_keyboard:
                      - "↩️ Вернуться:/menu_back , 🔄 Обновить:/lights"
