door_history:

  sensor:

    # DOOR 1

    - platform: history_stats
      name: door1_day
      entity_id: binary_sensor.door1_contact
      state: "on"
      type: count
      start: "{{ today_at('00:00') }}"
      end: "{{ now() }}"

    - platform: history_stats
      name: door1_week
      entity_id: binary_sensor.door1_contact
      state: "on"
      type: count
      start: "{{ now() - timedelta(days=7) }}"
      end: "{{ now() }}"

    - platform: history_stats
      name: door1_month
      entity_id: binary_sensor.door1_contact
      state: "on"
      type: count
      start: "{{ now() - timedelta(days=30) }}"
      end: "{{ now() }}"

    # DOOR 2

